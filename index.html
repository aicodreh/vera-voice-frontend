<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/@picovoice/porcupine-web@4.0.0/dist/iife/index.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }
        
        .pulse-ring {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
        
        .recording .pulse-ring {
            animation: recording-pulse 0.8s ease-in-out infinite;
            background: #ef4444 !important;
        }
        
        @keyframes recording-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        
        .recording .mic-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%) !important;
        }
        
        .speaking .mic-btn {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }
        
        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 40px;
        }
        
        .waveform .bar {
            width: 4px;
            background: #ef4444;
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        
        .waveform .bar:nth-child(1) { animation-delay: 0.0s; }
        .waveform .bar:nth-child(2) { animation-delay: 0.1s; }
        .waveform .bar:nth-child(3) { animation-delay: 0.2s; }
        .waveform .bar:nth-child(4) { animation-delay: 0.3s; }
        .waveform .bar:nth-child(5) { animation-delay: 0.4s; }
        
        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 35px; }
        }
        
        .message-bubble {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* Better touch responsiveness */
        .mic-btn {
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .mic-btn:active {
            transform: scale(0.95);
        }
        
        /* Wake word listening indicator */
        .wake-listening {
            animation: wake-pulse 2s ease-in-out infinite;
        }
        
        @keyframes wake-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(20, 184, 166, 0); }
        }
    </style>
</head>

        // Porcupine Wake Word Detection
        async function initPorcupine() {
            try {
                console.log('Initializing Porcupine...');
                
                // Create Porcupine instance with custom "Hey Vera" keyword
                // Using publicPath for model file (hosted alongside index.html)
                porcupine = await PorcupineWeb.PorcupineWorker.create(
                    PICOVOICE_ACCESS_KEY,
                    [{
                        base64: HEY_VERA_KEYWORD_BASE64,
                        label: 'Hey Vera'
                    }],
                    keywordDetectionCallback,
                    {
                        publicPath: './porcupine_params.pv',
                        forceWrite: true
                    }
                );
                
                console.log('Porcupine initialized successfully');
                return true;
            } catch (e) {
                console.error('Failed to initialize Porcupine:', e);
                console.error('Error details:', e.message);
                return false;
            }
        }
        
        // Callback when wake word is detected
        function keywordDetectionCallback(detection) {
            if (detection.index >= 0) {
                console.log('Wake word detected: Hey Vera!');
                
                if (!isRecording && !isProcessing) {
                    // Haptic feedback
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    
                    // Visual feedback
                    micBtn.classList.add('wake-listening');
                    setTimeout(() => micBtn.classList.remove('wake-listening'), 500);
                    
                    // Enable conversation mode - will auto-continue after responses
                    conversationMode = true;
                    console.log('Conversation mode enabled');
                    
                    // Start recording
                    startRecording();
                    
                    // Auto-stop after max time
                    recordingTimeout = setTimeout(() => {
                        if (isRecording) {
                            console.log('Max recording time reached');
                            stopRecording();
                        }
                    }, MAX_RECORDING_TIME);
                }
            }
        }
        
        async function startWakeWordListening() {
            if (!porcupine) {
                const success = await initPorcupine();
                if (!success) {
                    console.error('Could not initialize wake word detection');
                    setStatus('Wake Error', 'red');
                    return;
                }
            }
            
            try {
                // Start the Web Voice Processor to feed audio to Porcupine
                webVoiceProcessor = await WebVoiceProcessor.WebVoiceProcessor.subscribe(porcupine);
                console.log('Wake word listening started');
                setStatus('Listening...', 'teal');
                instruction.textContent = 'Say "Hey Vera"...';
            } catch (e) {
                console.error('Failed to start wake word listening:', e);
                setStatus('Mic Error', 'red');
            }
        }
        
        async function stopWakeWordListening() {
            if (webVoiceProcessor) {
                try {
                    await WebVoiceProcessor.WebVoiceProcessor.unsubscribe(porcupine);
                    webVoiceProcessor = null;
                } catch (e) {
                    console.error('Error stopping wake word listener:', e);
                }
            }
        }
        
        async function toggleWakeWord() {
            wakeWordEnabled = !wakeWordEnabled;
            
            if (wakeWordEnabled) {
                wakeToggle.classList.remove('bg-gray-700/50', 'text-gray-400');
                wakeToggle.classList.add('bg-teal-500/30', 'text-teal-400');
                wakeToggle.innerHTML = '🎤 Listening';
                await startWakeWordListening();
            } else {
                wakeToggle.classList.remove('bg-teal-500/30', 'text-teal-400');
                wakeToggle.classList.add('bg-gray-700/50', 'text-gray-400');
                wakeToggle.innerHTML = '🎤 Hey Vera';
                conversationMode = false; // Reset conversation mode
                await stopWakeWordListening();
                instruction.textContent = 'Type or hold mic to speak';
                setStatus('Ready', 'green');
            }
        }
        
        // Silence detection for auto-stop recording
        function startSilenceDetection(stream) {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            silenceAnalyser = audioContext.createAnalyser();
            silenceAnalyser.fftSize = 512;
            silenceAnalyser.smoothingTimeConstant = 0.8;
            
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(silenceAnalyser);
            
            lastSoundTime = Date.now();
            
            hasSpeechStarted = false;
            speechStartTime = null;
            
            silenceCheckInterval = setInterval(() => {
                if (!isRecording) {
                    stopSilenceDetection();
                    return;
                }
                
                const dataArray = new Uint8Array(silenceAnalyser.frequencyBinCount);
                silenceAnalyser.getByteFrequencyData(dataArray);
                const average = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
                
                // Must exceed SPEECH_THRESHOLD to count as real speech (not typing/noise)
                if (average > SPEECH_THRESHOLD) {
                    if (!hasSpeechStarted) {
                        hasSpeechStarted = true;
                        speechStartTime = Date.now();
                        console.log('Speech started (volume: ' + Math.round(average) + ')');
                    }
                    lastSoundTime = Date.now();
                } else if (average > SILENCE_THRESHOLD) {
                    // Above silence but below speech threshold
                    if (hasSpeechStarted) {
                        lastSoundTime = Date.now();
                    }
                } else {
                    // True silence - check if we should stop
                    if (hasSpeechStarted) {
                        const speechDuration = Date.now() - speechStartTime;
                        const silenceDuration = Date.now() - lastSoundTime;
                        
                        if (silenceDuration >= SILENCE_DURATION) {
                            // Only process if speech was long enough
                            if (speechDuration >= MIN_SPEECH_DURATION) {
                                console.log('Silence detected after ' + speechDuration + 'ms of speech, auto-stopping');
                                stopSilenceDetection();
                                stopRecording();
                            } else {
                                console.log('Speech too short (' + speechDuration + 'ms), ignoring');
                                // Reset and keep listening
                                hasSpeechStarted = false;
                                speechStartTime = null;
                                lastSoundTime = Date.now();
                            }
                        }
                    }
                }
            }, 100);
        }
        
        function stopSilenceDetection() {
            if (silenceCheckInterval) {
                clearInterval(silenceCheckInterval);
                silenceCheckInterval = null;
            }
            silenceAnalyser = null;
            hasSpeechStarted = false;
            speechStartTime = null;
        }
        
        // Interrupt detection - allows user to interrupt Vera while speaking
        async function startInterruptDetection() {
            try {
                // Small delay to let Vera's audio start playing first
                await new Promise(resolve => setTimeout(resolve, 300));
                
                interruptStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                
                interruptAnalyser = audioContext.createAnalyser();
                interruptAnalyser.fftSize = 512;
                interruptAnalyser.smoothingTimeConstant = 0.3;
                
                const source = audioContext.createMediaStreamSource(interruptStream);
                source.connect(interruptAnalyser);
                
                let consecutiveLoudFrames = 0;
                let baselineVolume = 0;
                let samplesCollected = 0;
                
                console.log('Interrupt detection started - speak to interrupt Vera');
                
                interruptCheckInterval = setInterval(() => {
                    if (!currentAudioSource) {
                        stopInterruptDetection();
                        return;
                    }
                    
                    const dataArray = new Uint8Array(interruptAnalyser.frequencyBinCount);
                    interruptAnalyser.getByteFrequencyData(dataArray);
                    const average = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;
                    
                    // Collect baseline for first 5 samples (Vera's audio bleeding into mic)
                    if (samplesCollected < 5) {
                        baselineVolume = Math.max(baselineVolume, average);
                        samplesCollected++;
                        return;
                    }
                    
                    // Must be significantly louder than baseline (user speaking over Vera)
                    const effectiveThreshold = Math.max(INTERRUPT_THRESHOLD, baselineVolume + 15);
                    
                    if (average > effectiveThreshold) {
                        consecutiveLoudFrames++;
                        // Require 3 consecutive loud frames to interrupt
                        if (consecutiveLoudFrames >= 3) {
                            console.log('Interrupt detected! (vol: ' + Math.round(average) + ' > threshold: ' + Math.round(effectiveThreshold) + ')');
                            stopInterruptDetection();
                            stopCurrentAudio();
                            startRecording();
                        }
                    } else {
                        consecutiveLoudFrames = 0;
                    }
                }, 100);
                
            } catch (e) {
                console.error('Failed to start interrupt detection:', e);
            }
        }
        
        function stopInterruptDetection() {
            if (interruptCheckInterval) {
                clearInterval(interruptCheckInterval);
                interruptCheckInterval = null;
            }
            if (interruptStream) {
                interruptStream.getTracks().forEach(track => track.stop());
                interruptStream = null;
            }
            interruptAnalyser = null;
        }
        
        // Stop any currently playing audio
        function stopCurrentAudio() {
            stopInterruptDetection();
            if (currentAudioSource) {
                try {
                    currentAudioSource.stop();
                } catch(e) {}
                currentAudioSource = null;
            }
            micContainer.classList.remove('speaking');
        }
        
        // Initialize audio context
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }
        
        // Initialize
        async function init() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(`${API_URL}/health`, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    setStatus('Ready', 'green');
                } else {
                    setStatus('API Offline', 'red');
                }
            } catch (e) {
                setStatus('API Offline', 'red');
                console.error('API check failed:', e);
            }
        }
        
        // Status helper
        function setStatus(text, color) {
            status.textContent = text;
            status.className = `text-xs px-3 py-1 rounded-full`;
            if (color === 'green') {
                status.classList.add('bg-green-500/20', 'text-green-400');
            } else if (color === 'red') {
                status.classList.add('bg-red-500/20', 'text-red-400');
            } else if (color === 'yellow') {
                status.classList.add('bg-yellow-500/20', 'text-yellow-400');
            } else {
                status.classList.add('bg-teal-500/20', 'text-teal-400');
            }
        }
        
        // Set processing state
        function setProcessing(processing) {
            isProcessing = processing;
            micBtn.classList.toggle('disabled', processing);
            
            if (processing) {
                micIcon.classList.add('hidden');
                stopIcon.classList.add('hidden');
                loadingIcon.classList.remove('hidden');
            } else {
                micIcon.classList.remove('hidden');
                stopIcon.classList.add('hidden');
                loadingIcon.classList.add('hidden');
            }
        }
        
        // Conversation history storage
        const STORAGE_KEY = 'vera_chat_history';
        
        function saveHistory() {
            const messages = [];
            document.querySelectorAll('.message-bubble').forEach(bubble => {
                const isUser = bubble.classList.contains('flex-row-reverse');
                const text = bubble.querySelector('p')?.textContent || '';
                const time = bubble.querySelector('.msg-time')?.textContent || '';
                if (text && !text.includes("I'm Vera. Tap and hold")) {
                    messages.push({ text, isUser, time });
                }
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        }
        
        function loadHistory() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const messages = JSON.parse(saved);
                    messages.forEach(msg => addMessage(msg.text, msg.isUser, msg.time, false));
                }
            } catch (e) {
                console.error('Error loading history:', e);
            }
        }
        
        function clearHistory() {
            localStorage.removeItem(STORAGE_KEY);
            const messages = chat.querySelectorAll('.message-bubble');
            messages.forEach((msg, i) => {
                if (i > 0) msg.remove();
            });
        }
        
        function formatTime(date) {
            return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }
        
        function addMessage(text, isUser = false, timestamp = null, save = true) {
            const div = document.createElement('div');
            div.className = 'message-bubble flex gap-3' + (isUser ? ' flex-row-reverse' : '');
            
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full overflow-hidden flex items-center justify-center flex-shrink-0 ${isUser ? 'bg-blue-500' : 'bg-black'}`;
            avatar.innerHTML = isUser ? '<span class="text-sm">👤</span>' : '<img src="vera-icon.jpg" alt="V" class="w-full h-full object-cover">';
            
            const timeStr = timestamp || formatTime(new Date());
            
            const bubble = document.createElement('div');
            bubble.className = `rounded-2xl px-4 py-3 max-w-[80%] ${isUser ? 'bg-blue-500/30 rounded-tr-sm' : 'bg-gray-800/50 rounded-tl-sm'}`;
            bubble.innerHTML = `<p class="text-sm">${text}</p><span class="msg-time text-[10px] text-gray-500 mt-1 block">${timeStr}</span>`;
            
            div.appendChild(avatar);
            div.appendChild(bubble);
            chat.appendChild(div);
            
            chat.scrollTop = chat.scrollHeight;
            
            if (save) saveHistory();
        }
        
        // Reset to ready state
        function resetToReady() {
            if (mediaRecorder) {
                try { mediaRecorder.stop(); } catch(e) {}
                mediaRecorder = null;
            }
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            audioChunks = [];
            isRecording = false;
            
            setProcessing(false);
            micContainer.classList.remove('recording', 'speaking');
            waveformContainer.classList.add('hidden');
            
            if (wakeWordEnabled) {
                if (conversationMode) {
                    instruction.textContent = 'Conversation active - listening...';
                    setStatus('In Conversation', 'teal');
                } else {
                    instruction.textContent = 'Say "Hey Vera"...';
                    setStatus('Listening...', 'teal');
                }
                // Resume wake word listening after response
                startWakeWordListening();
            } else {
                instruction.textContent = 'Type or hold mic to speak';
                setStatus('Ready', 'green');
            }
        }
        
        // Start recording
        async function startRecording() {
            if (isProcessing) return;
            
            // Stop any playing audio first
            stopCurrentAudio();
            
            // Pause wake word listening during recording
            if (wakeWordEnabled) {
                await stopWakeWordListening();
            }
            
            // Clean up any previous recorder
            if (mediaRecorder) {
                try { mediaRecorder.stop(); } catch(e) {}
                mediaRecorder = null;
            }
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            
            try {
                audioChunks = [];
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                currentStream = stream;
                
                let options = {};
                if (MediaRecorder.isTypeSupported('audio/webm')) {
                    options.mimeType = 'audio/webm';
                }
                
                mediaRecorder = new MediaRecorder(stream, options);
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
                    
                    if (currentStream) {
                        currentStream.getTracks().forEach(track => track.stop());
                        currentStream = null;
                    }
                    
                    // Require minimum 5KB of audio to avoid Whisper hallucinations on noise
                    if (audioBlob.size > 5000) {
                        await sendAudio(audioBlob);
                    } else if (audioBlob.size > 1000) {
                        console.log('Audio too short (' + audioBlob.size + ' bytes), skipping');
                        // In conversation mode, just go back to listening
                        if (conversationMode) {
                            resetToReady();
                            setTimeout(() => {
                                if (wakeWordEnabled && conversationMode && !isRecording && !isProcessing) {
                                    startRecording();
                                }
                            }, 500);
                        } else {
                            resetToReady();
                        }
                    } else {
                        resetToReady();
                        addMessage("I didn't catch that. Please hold the button and speak clearly.", false);
                    }
                };
                
                mediaRecorder.start(100);
                isRecording = true;
                
                // UI updates
                micContainer.classList.add('recording');
                micIcon.classList.add('hidden');
                stopIcon.classList.remove('hidden');
                waveformContainer.classList.remove('hidden');
                instruction.textContent = wakeWordEnabled ? 'Listening... (auto-stops on silence)' : 'Listening... (tap mic to send)';
                setStatus('Recording', 'teal');
                
                // Start silence detection for auto-stop (only in wake word mode)
                if (wakeWordEnabled) {
                    startSilenceDetection(stream);
                }
                
            } catch (e) {
                console.error('Microphone error:', e);
                setStatus('Mic Error', 'red');
                instruction.textContent = 'Please allow microphone access';
            }
        }
        
        // Stop recording
        function stopRecording() {
            if (recordingTimeout) {
                clearTimeout(recordingTimeout);
                recordingTimeout = null;
            }
            
            if (conversationTimeout) {
                clearTimeout(conversationTimeout);
                conversationTimeout = null;
            }
            
            // Stop silence detection
            stopSilenceDetection();
            
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                micContainer.classList.remove('recording');
                waveformContainer.classList.add('hidden');
                instruction.textContent = 'Processing...';
                setStatus('Processing', 'yellow');
                setProcessing(true);
            }
        }
        
        // Send audio to API
        async function sendAudio(audioBlob) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => {
                controller.abort();
            }, TIMEOUT_MS);
            
            try {
                const formData = new FormData();
                formData.append('audio', audioBlob, 'recording.webm');
                
                const response = await fetch(`${API_URL}/api/voice`, {
                    method: 'POST',
                    body: formData,
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API error: ${errorText}`);
                }
                
                const userText = decodeURIComponent(response.headers.get('X-User-Text') || '');
                const veraResponse = decodeURIComponent(response.headers.get('X-Vera-Response') || '');
                
                if (userText) {
                    addMessage(userText, true);
                    
                    // Check for exit phrases to end conversation mode
                    const lowerText = userText.toLowerCase();
                    if (EXIT_PHRASES.some(phrase => lowerText.includes(phrase))) {
                        console.log('Exit phrase detected, ending conversation mode');
                        conversationMode = false;
                    }
                }
                
                const audioBlob2 = await response.blob();
                const arrayBuffer = await audioBlob2.arrayBuffer();
                
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                
                try {
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(audioContext.destination);
                    
                    currentAudioSource = source;
                    
                    setProcessing(false);
                    if (veraResponse) {
                        addMessage(veraResponse, false);
                    }
                    micContainer.classList.add('speaking');
                    setStatus('Speaking', 'green');
                    
                    // Start listening for interrupts while Vera speaks
                    if (wakeWordEnabled && conversationMode) {
                        startInterruptDetection();
                    }
                    
                    source.onended = () => {
                        currentAudioSource = null;
                        
                        // In conversation mode, auto-start recording for follow-up
                        if (wakeWordEnabled && conversationMode) {
                            console.log('Conversation mode: auto-starting recording for follow-up');
                            micContainer.classList.remove('speaking');
                            setStatus('Your turn...', 'teal');
                            instruction.textContent = 'Listening for follow-up...';
                            
                            // Small delay before starting to record
                            setTimeout(() => {
                                if (wakeWordEnabled && conversationMode && !isRecording && !isProcessing) {
                                    startRecording();
                                    
                                    // Set conversation timeout - if no response, exit conversation mode
                                    conversationTimeout = setTimeout(() => {
                                        if (isRecording) {
                                            console.log('Conversation timeout - no speech detected');
                                            stopRecording();
                                            conversationMode = false;
                                            instruction.textContent = 'Say "Hey Vera" to start...';
                                        }
                                    }, CONVERSATION_EXIT_DELAY);
                                }
                            }, 500);
                        } else {
                            resetToReady();
                        }
                    };
                    
                    source.start(0);
                } catch (audioError) {
                    console.error('Audio decode/play error:', audioError);
                    setProcessing(false);
                    if (veraResponse) {
                        addMessage(veraResponse, false);
                    }
                    resetToReady();
                }
                
            } catch (e) {
                clearTimeout(timeoutId);
                console.error('Send error:', e);
                
                resetToReady();
                
                if (e.name === 'AbortError') {
                    setStatus('Timeout', 'red');
                    addMessage('Request timed out. Please try a shorter message.', false);
                } else {
                    setStatus('Error', 'red');
                    addMessage('Sorry, there was an error processing your request. Please try again.', false);
                }
            }
        }
        
        // Event listeners
        micBtn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (isRecording) {
                stopRecording();
                return;
            }
            if (!isProcessing) startRecording();
        });
        micBtn.addEventListener('mouseup', (e) => {
            e.preventDefault();
            if (isRecording && !wakeWordEnabled) {
                stopRecording();
            }
        });
        micBtn.addEventListener('mouseleave', () => {
            if (isRecording && !wakeWordEnabled) stopRecording();
        });
        
        // Touch events for mobile
        micBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            initAudioContext();
            
            if (isRecording) {
                if (navigator.vibrate) navigator.vibrate(50);
                stopRecording();
                return;
            }
            
            if (!isProcessing) {
                if (navigator.vibrate) navigator.vibrate(50);
                startRecording();
            }
        }, { passive: false });
        
        micBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (isRecording && !wakeWordEnabled) {
                stopRecording();
            }
        }, { passive: false });
        
        micBtn.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });
        
        // Text input handling
        textInput.addEventListener('input', () => {
            sendBtn.disabled = textInput.value.trim() === '' || isProcessing;
        });
        
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendTextMessage();
            }
        });
        
        sendBtn.addEventListener('click', () => {
            if (!sendBtn.disabled) {
                sendTextMessage();
            }
        });
        
        async function sendTextMessage() {
            const text = textInput.value.trim();
            if (!text || isProcessing) return;
            
            textInput.value = '';
            sendBtn.disabled = true;
            
            addMessage(text, true);
            
            setProcessing(true);
            setStatus('Processing', 'yellow');
            instruction.textContent = 'Thinking...';
            
            try {
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                if (!response.ok) {
                    throw new Error('API error');
                }
                
                const data = await response.json();
                const veraResponse = data.response || data.text || 'I received your message.';
                
                addMessage(veraResponse, false);
                
                await speakResponse(veraResponse);
                
            } catch (e) {
                console.error('Text send error:', e);
                addMessage('Sorry, there was an error processing your message. Please try again.', false);
            }
            
            resetToReady();
        }
        
        async function speakResponse(text) {
            return new Promise(async (resolve) => {
                try {
                    setStatus('Speaking', 'green');
                    micContainer.classList.add('speaking');
                    
                    const response = await fetch(`${API_URL}/api/speak?text=${encodeURIComponent(text)}`, {
                        method: 'POST'
                    });
                    
                    if (!response.ok) {
                        resolve();
                        return;
                    }
                    
                    const audioBlob = await response.blob();
                    const arrayBuffer = await audioBlob.arrayBuffer();
                    
                    if (!audioContext) {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                    }
                    
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(audioContext.destination);
                    
                    currentAudioSource = source;
                    
                    source.onended = () => {
                        currentAudioSource = null;
                        micContainer.classList.remove('speaking');
                        setStatus('Ready', 'green');
                        resolve();
                    };
                    
                    source.start(0);
                } catch (e) {
                    console.error('TTS error:', e);
                    micContainer.classList.remove('speaking');
                    resolve();
                }
            });
        }
        
        // Wake word toggle
        wakeToggle.addEventListener('click', () => {
            initAudioContext();
            toggleWakeWord();
        });
        
        // Settings menu
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.classList.toggle('hidden');
        });
        
        document.addEventListener('click', (e) => {
            if (!settingsMenu.contains(e.target) && e.target !== settingsBtn) {
                settingsMenu.classList.add('hidden');
            }
        });
        
        clearChatBtn.addEventListener('click', () => {
            if (confirm('Clear chat history?')) {
                clearHistory();
                settingsMenu.classList.add('hidden');
            }
        });
        
        // Load history and initialize
        loadHistory();
        init();
    </script>
</body>
</html>
