<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vera Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }
        
        .pulse-ring {
            animation: pulse-ring 1.5s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }
        
        .recording .pulse-ring {
            animation: recording-pulse 0.8s ease-in-out infinite;
            background: #ef4444 !important;
        }
        
        @keyframes recording-pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0.4; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        
        .recording .mic-btn {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%) !important;
        }
        
        .speaking .mic-btn {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }
        
        .waveform {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
            height: 40px;
        }
        
        .waveform .bar {
            width: 4px;
            background: #ef4444;
            border-radius: 2px;
            animation: wave 1s ease-in-out infinite;
        }
        
        .waveform .bar:nth-child(1) { animation-delay: 0.0s; }
        .waveform .bar:nth-child(2) { animation-delay: 0.1s; }
        .waveform .bar:nth-child(3) { animation-delay: 0.2s; }
        .waveform .bar:nth-child(4) { animation-delay: 0.3s; }
        .waveform .bar:nth-child(5) { animation-delay: 0.4s; }
        
        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 35px; }
        }
        
        .message-bubble {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .disabled {
            opacity: 0.5;
            pointer-events: none;
        }
        
        /* Better touch responsiveness */
        .mic-btn {
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .mic-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="min-h-screen text-white flex flex-col">
    <!-- Header -->
    <header class="p-4 border-b border-gray-800">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full overflow-hidden bg-black flex items-center justify-center">
                    <img src="vera-icon.jpg" alt="Vera" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="font-bold text-lg">Vera</h1>
                    <p class="text-xs text-gray-400">AI Executive Assistant</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="wake-toggle" class="text-xs px-3 py-1 rounded-full bg-gray-700/50 text-gray-400 hover:bg-gray-600/50 transition-colors" title="Enable 'Hey Vera' wake word">
                    🎤 Wake
                </button>
                <div id="status" class="text-xs px-3 py-1 rounded-full bg-green-500/20 text-green-400">
                    Ready
                </div>
                <!-- Settings Menu -->
                <div class="relative">
                    <button id="settings-btn" class="text-xs px-3 py-1 rounded-full bg-gray-700/50 text-gray-400 hover:bg-gray-600/50 transition-colors" title="Settings">
                        ⚙️
                    </button>
                    <div id="settings-menu" class="hidden absolute right-0 top-full mt-2 w-48 bg-gray-800 border border-gray-700 rounded-lg shadow-xl z-50">
                        <button id="clear-chat" class="w-full text-left px-4 py-3 text-sm text-gray-300 hover:bg-red-500/20 hover:text-red-400 transition-colors rounded-lg flex items-center gap-2">
                            🗑️ Clear Chat History
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Chat Container -->
    <main class="flex-1 overflow-y-auto p-4">
        <div id="chat" class="max-w-2xl mx-auto space-y-4">
            <!-- Welcome message -->
            <div class="message-bubble flex gap-3">
                <div class="w-8 h-8 rounded-full overflow-hidden bg-black flex items-center justify-center flex-shrink-0">
                    <img src="vera-icon.jpg" alt="V" class="w-full h-full object-cover">
                </div>
                <div class="bg-gray-800/50 rounded-2xl rounded-tl-sm px-4 py-3 max-w-[80%]">
                    <p class="text-sm">Hello! I'm Vera. Tap and hold the microphone button to speak with me. Keep your message short (3-5 seconds) for best results.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Voice Control -->
    <footer class="p-4 border-t border-gray-800 sticky bottom-0 bg-gradient-to-t from-[#0a0a0a] to-[#0a0a0a]/95 backdrop-blur-sm">
        <div class="max-w-2xl mx-auto">
            <!-- Waveform (hidden by default) -->
            <div id="waveform-container" class="hidden mb-4 flex justify-center">
                <div class="waveform">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>
            
            <!-- Text Input + Mic Button Row -->
            <div class="flex items-center gap-3">
                <!-- Text Input -->
                <div class="flex-1 relative">
                    <input 
                        type="text" 
                        id="text-input"
                        placeholder="Type a message..."
                        class="w-full bg-gray-800/50 border border-gray-700 rounded-full px-5 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all"
                    >
                    <button 
                        id="send-btn"
                        class="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 rounded-full bg-teal-500 hover:bg-teal-400 flex items-center justify-center transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                        disabled
                    >
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                        </svg>
                    </button>
                </div>
                
                <!-- Mic Button -->
                <div id="mic-container" class="flex-shrink-0">
                    <div class="relative">
                        <div class="pulse-ring absolute inset-0 rounded-full bg-teal-500/30"></div>
                        <button 
                            id="mic-btn"
                            class="mic-btn relative w-14 h-14 rounded-full bg-gradient-to-br from-teal-400 to-teal-600 flex items-center justify-center shadow-lg shadow-teal-500/25 hover:shadow-teal-500/40 transition-all active:scale-95"
                        >
                            <svg id="mic-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
                            </svg>
                            <svg id="stop-icon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24">
                                <rect x="6" y="6" width="12" height="12" rx="2"/>
                            </svg>
                            <svg id="loading-icon" class="w-6 h-6 hidden animate-spin" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
            
            <p id="instruction" class="text-center text-gray-500 text-xs mt-2">
                Type or hold mic to speak
            </p>
            

        </div>
    </footer>

    <script>
        // Configuration
        const API_URL = 'https://vera-voice-web-production.up.railway.app';
        const TIMEOUT_MS = 30000; // 30 second timeout
        
        // DOM Elements
        const micBtn = document.getElementById('mic-btn');
        const micContainer = document.getElementById('mic-container');
        const micIcon = document.getElementById('mic-icon');
        const stopIcon = document.getElementById('stop-icon');
        const loadingIcon = document.getElementById('loading-icon');
        const status = document.getElementById('status');
        const chat = document.getElementById('chat');
        const instruction = document.getElementById('instruction');
        const waveformContainer = document.getElementById('waveform-container');
        const textInput = document.getElementById('text-input');
        const sendBtn = document.getElementById('send-btn');
        const wakeToggle = document.getElementById('wake-toggle');
        const clearChatBtn = document.getElementById('clear-chat');
        const settingsBtn = document.getElementById('settings-btn');
        const settingsMenu = document.getElementById('settings-menu');
        
        // State
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let isProcessing = false;
        let lastAudioBlob = null;
        let currentStream = null;
        let audioContext = null;
        let currentAudioSource = null;  // Track playing audio so we can stop it
        let wakeWordEnabled = false;
        let wakeWordRecognition = null;
        let conversationRecognition = null;
        let silenceTimeout = null;
        let currentTranscript = '';
        let isConversationMode = false;
        const SILENCE_THRESHOLD = 1500; // 1.5 seconds of silence = end of speech
        
        // Wake word detection using Web Speech API
        function initWakeWord() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                console.log('Wake word not supported in this browser');
                wakeToggle.style.display = 'none';
                return false;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            wakeWordRecognition = new SpeechRecognition();
            wakeWordRecognition.continuous = true;
            wakeWordRecognition.interimResults = true;
            wakeWordRecognition.lang = 'en-US';
            
            wakeWordRecognition.onresult = (event) => {
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript.toLowerCase().trim();
                    console.log('Wake word heard:', transcript);
                    
                    // Check for wake words
                    if (transcript.includes('hey vera') || 
                        transcript.includes('hi vera') || 
                        transcript.includes('okay vera') ||
                        transcript.includes('vera') && transcript.length < 15) {
                        
                        if (!isRecording && !isProcessing && !isConversationMode) {
                            console.log('Wake word detected! Starting conversation mode...');
                            // Stop wake word listening
                            stopWakeWordListening();
                            // Visual feedback
                            if (navigator.vibrate) navigator.vibrate(100);
                            // Start conversation mode (continuous listening)
                            startConversationMode();
                        }
                        break;
                    }
                }
            };
            
            wakeWordRecognition.onerror = (event) => {
                console.log('Wake word error:', event.error);
                if (event.error === 'no-speech' || event.error === 'audio-capture') {
                    // Restart listening
                    if (wakeWordEnabled) {
                        setTimeout(() => startWakeWordListening(), 500);
                    }
                }
            };
            
            wakeWordRecognition.onend = () => {
                // Restart if still enabled
                if (wakeWordEnabled && !isRecording && !isProcessing) {
                    setTimeout(() => startWakeWordListening(), 500);
                }
            };
            
            return true;
        }
        
        function startWakeWordListening() {
            if (wakeWordRecognition && wakeWordEnabled && !isRecording && !isProcessing) {
                try {
                    wakeWordRecognition.start();
                    console.log('Wake word listening started');
                } catch (e) {
                    console.log('Wake word already listening');
                }
            }
        }
        
        function stopWakeWordListening() {
            if (wakeWordRecognition) {
                try {
                    wakeWordRecognition.stop();
                } catch (e) {}
            }
        }
        
        // Conversation mode - continuous listening with silence detection
        function startConversationMode() {
            if (isConversationMode || isProcessing) return;
            
            isConversationMode = true;
            currentTranscript = '';
            
            // Stop any playing audio
            stopCurrentAudio();
            
            // UI updates
            micContainer.classList.add('recording');
            setStatus('Listening...', 'teal');
            instruction.textContent = 'Speak naturally... (pause when done)';
            waveformContainer.classList.remove('hidden');
            
            // Create speech recognition for conversation
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            conversationRecognition = new SpeechRecognition();
            conversationRecognition.continuous = true;
            conversationRecognition.interimResults = true;
            conversationRecognition.lang = 'en-US';
            
            conversationRecognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';
                
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }
                
                // Update current transcript
                if (finalTranscript) {
                    currentTranscript += finalTranscript + ' ';
                }
                
                // Show real-time transcription
                const displayText = currentTranscript + interimTranscript;
                if (displayText.trim()) {
                    instruction.textContent = displayText.trim().slice(-50) + (displayText.length > 50 ? '...' : '');
                }
                
                // Reset silence timer on any speech
                clearTimeout(silenceTimeout);
                silenceTimeout = setTimeout(() => {
                    // Silence detected - end conversation turn
                    if (currentTranscript.trim()) {
                        endConversationTurn();
                    }
                }, SILENCE_THRESHOLD);
            };
            
            conversationRecognition.onerror = (event) => {
                console.log('Conversation recognition error:', event.error);
                if (event.error === 'no-speech') {
                    // No speech detected - wait longer
                    clearTimeout(silenceTimeout);
                    silenceTimeout = setTimeout(() => {
                        if (currentTranscript.trim()) {
                            endConversationTurn();
                        } else {
                            // No speech at all, go back to wake word
                            stopConversationMode();
                            instruction.textContent = 'No speech detected';
                            setTimeout(() => {
                                if (wakeWordEnabled) startWakeWordListening();
                                resetToReady();
                            }, 1500);
                        }
                    }, 2000);
                }
            };
            
            conversationRecognition.onend = () => {
                // Restart if still in conversation mode and not processing
                if (isConversationMode && !isProcessing) {
                    try {
                        conversationRecognition.start();
                    } catch (e) {
                        console.log('Could not restart conversation recognition');
                    }
                }
            };
            
            try {
                conversationRecognition.start();
                console.log('Conversation mode started');
            } catch (e) {
                console.error('Failed to start conversation mode:', e);
                stopConversationMode();
            }
        }
        
        function stopConversationMode() {
            isConversationMode = false;
            clearTimeout(silenceTimeout);
            
            if (conversationRecognition) {
                try {
                    conversationRecognition.stop();
                } catch (e) {}
                conversationRecognition = null;
            }
            
            micContainer.classList.remove('recording');
            waveformContainer.classList.add('hidden');
        }
        
        async function endConversationTurn() {
            const text = currentTranscript.trim();
            if (!text) return;
            
            console.log('End of speech detected. Transcript:', text);
            
            // Stop listening
            stopConversationMode();
            
            // Show processing state
            setProcessing(true);
            setStatus('Processing', 'yellow');
            instruction.textContent = 'Thinking...';
            
            // Add user message
            addMessage(text, true);
            
            try {
                // Send to API
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                if (!response.ok) throw new Error('API error');
                
                const data = await response.json();
                const veraResponse = data.response || 'I received your message.';
                
                // Add Vera's response
                addMessage(veraResponse, false);
                
                // Speak the response
                await speakResponse(veraResponse);
                
                // After speaking, go back to conversation mode (continuous conversation)
                if (wakeWordEnabled) {
                    setTimeout(() => {
                        if (!isProcessing) {
                            startConversationMode();
                        }
                    }, 500);
                }
                
            } catch (e) {
                console.error('Conversation error:', e);
                addMessage('Sorry, there was an error. Please try again.', false);
                resetToReady();
                if (wakeWordEnabled) {
                    setTimeout(() => startWakeWordListening(), 1000);
                }
            }
            
            setProcessing(false);
        }
        
        function toggleWakeWord() {
            wakeWordEnabled = !wakeWordEnabled;
            
            if (wakeWordEnabled) {
                if (!wakeWordRecognition) {
                    if (!initWakeWord()) {
                        wakeWordEnabled = false;
                        alert('Wake word detection is not supported in this browser. Please use Chrome.');
                        return;
                    }
                }
                startWakeWordListening();
                wakeToggle.classList.remove('bg-gray-700/50', 'text-gray-400');
                wakeToggle.classList.add('bg-teal-500/30', 'text-teal-400');
                wakeToggle.innerHTML = '🎤 Listening...';
                instruction.textContent = 'Say "Hey Vera" or hold mic';
            } else {
                stopWakeWordListening();
                wakeToggle.classList.remove('bg-teal-500/30', 'text-teal-400');
                wakeToggle.classList.add('bg-gray-700/50', 'text-gray-400');
                wakeToggle.innerHTML = '🎤 Wake';
                instruction.textContent = 'Hold to speak';
            }
        }
        
        // Stop any currently playing audio
        function stopCurrentAudio() {
            if (currentAudioSource) {
                try {
                    currentAudioSource.stop();
                } catch(e) {}
                currentAudioSource = null;
            }
            micContainer.classList.remove('speaking');
        }
        
        // Initialize audio context on first user interaction (iOS requirement)
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
        }
        
        // Initialize
        async function init() {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 5000);
                
                const response = await fetch(`${API_URL}/health`, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    setStatus('Ready', 'green');
                } else {
                    setStatus('API Offline', 'red');
                }
            } catch (e) {
                setStatus('API Offline', 'red');
                console.error('API check failed:', e);
            }
        }
        
        // Status helper
        function setStatus(text, color) {
            status.textContent = text;
            status.className = `text-xs px-3 py-1 rounded-full`;
            if (color === 'green') {
                status.classList.add('bg-green-500/20', 'text-green-400');
            } else if (color === 'red') {
                status.classList.add('bg-red-500/20', 'text-red-400');
            } else if (color === 'yellow') {
                status.classList.add('bg-yellow-500/20', 'text-yellow-400');
            } else {
                status.classList.add('bg-teal-500/20', 'text-teal-400');
            }
        }
        

        
        // Set processing state
        function setProcessing(processing) {
            isProcessing = processing;
            micBtn.classList.toggle('disabled', processing);
            
            if (processing) {
                micIcon.classList.add('hidden');
                stopIcon.classList.add('hidden');
                loadingIcon.classList.remove('hidden');
            } else {
                micIcon.classList.remove('hidden');
                stopIcon.classList.add('hidden');
                loadingIcon.classList.add('hidden');
            }
        }
        
        // Add message to chat
        // Conversation history storage
        const STORAGE_KEY = 'vera_chat_history';
        
        function saveHistory() {
            const messages = [];
            document.querySelectorAll('.message-bubble').forEach(bubble => {
                const isUser = bubble.classList.contains('flex-row-reverse');
                const text = bubble.querySelector('p')?.textContent || '';
                const time = bubble.querySelector('.msg-time')?.textContent || '';
                if (text && !text.includes("I'm Vera. Tap and hold")) {
                    messages.push({ text, isUser, time });
                }
            });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
        }
        
        function loadHistory() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const messages = JSON.parse(saved);
                    messages.forEach(msg => addMessage(msg.text, msg.isUser, msg.time, false));
                }
            } catch (e) {
                console.error('Error loading history:', e);
            }
        }
        
        function clearHistory() {
            localStorage.removeItem(STORAGE_KEY);
            // Remove all messages except welcome
            const messages = chat.querySelectorAll('.message-bubble');
            messages.forEach((msg, i) => {
                if (i > 0) msg.remove();  // Keep first (welcome) message
            });
        }
        
        function formatTime(date) {
            return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }
        
        function addMessage(text, isUser = false, timestamp = null, save = true) {
            const div = document.createElement('div');
            div.className = 'message-bubble flex gap-3' + (isUser ? ' flex-row-reverse' : '');
            
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full overflow-hidden flex items-center justify-center flex-shrink-0 ${isUser ? 'bg-blue-500' : 'bg-black'}`;
            avatar.innerHTML = isUser ? '<span class="text-sm">👤</span>' : '<img src="vera-icon.jpg" alt="V" class="w-full h-full object-cover">';
            
            const timeStr = timestamp || formatTime(new Date());
            
            const bubble = document.createElement('div');
            bubble.className = `rounded-2xl px-4 py-3 max-w-[80%] ${isUser ? 'bg-blue-500/30 rounded-tr-sm' : 'bg-gray-800/50 rounded-tl-sm'}`;
            bubble.innerHTML = `<p class="text-sm">${text}</p><span class="msg-time text-[10px] text-gray-500 mt-1 block">${timeStr}</span>`;
            
            div.appendChild(avatar);
            div.appendChild(bubble);
            chat.appendChild(div);
            
            // Scroll to bottom
            chat.scrollTop = chat.scrollHeight;
            
            // Save to localStorage
            if (save) saveHistory();
        }
        
        // Reset to ready state
        function resetToReady() {
            // Clean up old recorder/stream
            if (mediaRecorder) {
                try { mediaRecorder.stop(); } catch(e) {}
                mediaRecorder = null;
            }
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            audioChunks = [];
            isRecording = false;
            
            setProcessing(false);
            micContainer.classList.remove('recording', 'speaking');
            waveformContainer.classList.add('hidden');
            
            // Restore instruction based on wake word state
            if (wakeWordEnabled) {
                instruction.textContent = 'Say "Hey Vera" or hold mic';
                // Restart wake word listening after a delay
                setTimeout(() => startWakeWordListening(), 1000);
            } else {
                instruction.textContent = 'Hold to speak';
            }
            setStatus('Ready', 'green');
        }
        
        // Start recording
        async function startRecording() {
            if (isProcessing) return;
            
            // Stop any playing audio first
            stopCurrentAudio();
            
            // Clean up any previous recorder
            if (mediaRecorder) {
                try { mediaRecorder.stop(); } catch(e) {}
                mediaRecorder = null;
            }
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
                currentStream = null;
            }
            
            try {
                
                audioChunks = [];
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                currentStream = stream;
                
                // Try webm first, fall back to default
                let options = {};
                if (MediaRecorder.isTypeSupported('audio/webm')) {
                    options.mimeType = 'audio/webm';
                }
                
                mediaRecorder = new MediaRecorder(stream, options);
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
                    lastAudioBlob = audioBlob;
                    
                    // Stop tracks
                    if (currentStream) {
                        currentStream.getTracks().forEach(track => track.stop());
                        currentStream = null;
                    }
                    
                    // Only process if we have meaningful audio (> 1KB)
                    if (audioBlob.size > 1000) {
                        await sendAudio(audioBlob);
                    } else {
                        resetToReady();
                        addMessage("I didn't catch that. Please hold the button and speak clearly.", false);
                    }
                };
                
                mediaRecorder.start(100); // Collect data every 100ms
                isRecording = true;
                
                // UI updates
                micContainer.classList.add('recording');
                micIcon.classList.add('hidden');
                stopIcon.classList.remove('hidden');
                waveformContainer.classList.remove('hidden');
                instruction.textContent = 'Listening...';
                setStatus('Recording', 'teal');
                
            } catch (e) {
                console.error('Microphone error:', e);
                setStatus('Mic Error', 'red');
                instruction.textContent = 'Please allow microphone access';
            }
        }
        
        // Stop recording
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                
                // UI updates
                micContainer.classList.remove('recording');
                waveformContainer.classList.add('hidden');
                instruction.textContent = 'Processing...';
                setStatus('Processing', 'yellow');
                setProcessing(true);
            }
        }
        
        // Send audio to API with timeout
        async function sendAudio(audioBlob) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => {
                controller.abort();
            }, TIMEOUT_MS);
            
            try {
                const formData = new FormData();
                formData.append('audio', audioBlob, 'recording.webm');
                
                const response = await fetch(`${API_URL}/api/voice`, {
                    method: 'POST',
                    body: formData,
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`API error: ${errorText}`);
                }
                
                // Get metadata from headers
                const userText = decodeURIComponent(response.headers.get('X-User-Text') || '');
                const veraResponse = decodeURIComponent(response.headers.get('X-Vera-Response') || '');
                
                // Add user message
                if (userText) {
                    addMessage(userText, true);
                }
                
                // Play audio response using Web Audio API (better iOS support)
                const audioBlob2 = await response.blob();
                const arrayBuffer = await audioBlob2.arrayBuffer();
                
                // Ensure audio context is ready
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                
                try {
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(audioContext.destination);
                    
                    // Track current audio source so we can stop it
                    currentAudioSource = source;
                    
                    // Show message and update UI when playback starts
                    setProcessing(false);
                    if (veraResponse) {
                        addMessage(veraResponse, false);
                    }
                    micContainer.classList.add('speaking');
                    setStatus('Speaking', 'green');
                    
                    source.onended = () => {
                        currentAudioSource = null;
                        resetToReady();
                    };
                    
                    source.start(0);
                } catch (audioError) {
                    console.error('Audio decode/play error:', audioError);
                    // Fallback: just show text response
                    setProcessing(false);
                    if (veraResponse) {
                        addMessage(veraResponse, false);
                    }
                    resetToReady();
                }
                
            } catch (e) {
                clearTimeout(timeoutId);
                console.error('Send error:', e);
                
                resetToReady();
                setStatus('Error', 'red');
                
                if (e.name === 'AbortError') {
                    addMessage('Request timed out. Please try a shorter message.', false);
                } else {
                    addMessage('Sorry, there was an error processing your request. Please try again.', false);
                }
                
                
            }
        }
        
        // Event listeners - hold to talk
        micBtn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            if (!isProcessing) startRecording();
        });
        micBtn.addEventListener('mouseup', (e) => {
            e.preventDefault();
            stopRecording();
        });
        micBtn.addEventListener('mouseleave', () => {
            if (isRecording) stopRecording();
        });
        
        // Touch events for mobile - with better responsiveness
        micBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            e.stopPropagation();
            // Initialize audio context on touch (iOS requirement)
            initAudioContext();
            if (!isProcessing) {
                // Vibrate for haptic feedback if supported
                if (navigator.vibrate) navigator.vibrate(50);
                startRecording();
            }
        }, { passive: false });
        
        micBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            e.stopPropagation();
            stopRecording();
        }, { passive: false });
        
        // Prevent context menu on long press
        micBtn.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            return false;
        });
        
        // Prevent double-tap zoom on iOS
        let lastTouchEnd = 0;
        micBtn.addEventListener('touchend', (e) => {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, { passive: false });
        
        // Text input handling
        textInput.addEventListener('input', () => {
            sendBtn.disabled = textInput.value.trim() === '' || isProcessing;
        });
        
        textInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendTextMessage();
            }
        });
        
        sendBtn.addEventListener('click', () => {
            if (!sendBtn.disabled) {
                sendTextMessage();
            }
        });
        
        async function sendTextMessage() {
            const text = textInput.value.trim();
            if (!text || isProcessing) return;
            
            // Clear input
            textInput.value = '';
            sendBtn.disabled = true;
            
            // Add user message
            addMessage(text, true);
            
            // Set processing state
            setProcessing(true);
            setStatus('Processing', 'yellow');
            instruction.textContent = 'Thinking...';
            
            try {
                // Send text to API
                const response = await fetch(`${API_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                
                if (!response.ok) {
                    throw new Error('API error');
                }
                
                const data = await response.json();
                const veraResponse = data.response || data.text || 'I received your message.';
                
                // Add Vera's response
                addMessage(veraResponse, false);
                
                // Play TTS if audio is returned
                if (data.audio_url) {
                    await playAudioFromUrl(data.audio_url);
                } else {
                    // Generate TTS for the response
                    await speakResponse(veraResponse);
                }
                
            } catch (e) {
                console.error('Text send error:', e);
                addMessage('Sorry, there was an error processing your message. Please try again.', false);
            }
            
            resetToReady();
        }
        
        async function speakResponse(text) {
            return new Promise(async (resolve) => {
                try {
                    setStatus('Speaking', 'green');
                    micContainer.classList.add('speaking');
                    
                    const response = await fetch(`${API_URL}/api/speak?text=${encodeURIComponent(text)}`, {
                        method: 'POST'
                    });
                    
                    if (!response.ok) {
                        resolve();
                        return;
                    }
                    
                    const audioBlob = await response.blob();
                    const arrayBuffer = await audioBlob.arrayBuffer();
                    
                    if (!audioContext) {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }
                    if (audioContext.state === 'suspended') {
                        await audioContext.resume();
                    }
                    
                    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
                    const source = audioContext.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(audioContext.destination);
                    
                    // Track current audio source
                    currentAudioSource = source;
                    
                    source.onended = () => {
                        currentAudioSource = null;
                        micContainer.classList.remove('speaking');
                        setStatus('Ready', 'green');
                        resolve();
                    };
                    
                    source.start(0);
                } catch (e) {
                    console.error('TTS error:', e);
                    micContainer.classList.remove('speaking');
                    resolve();
                }
            });
        }
        
        // Wake word toggle
        wakeToggle.addEventListener('click', () => {
            initAudioContext();  // Needed for iOS
            toggleWakeWord();
        });
        
        // Settings menu toggle
        settingsBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            settingsMenu.classList.toggle('hidden');
        });
        
        // Close settings menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!settingsMenu.contains(e.target) && e.target !== settingsBtn) {
                settingsMenu.classList.add('hidden');
            }
        });
        
        // Clear chat button (inside settings)
        clearChatBtn.addEventListener('click', () => {
            if (confirm('Clear chat history?')) {
                clearHistory();
                settingsMenu.classList.add('hidden');
            }
        });
        
        // Load saved history on page load
        loadHistory();
        
        // Initialize on load
        init();
    </script>
</body>
</html>
